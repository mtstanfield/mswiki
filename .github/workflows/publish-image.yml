name: Build and Push Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            cppcheck \
            libsqlite3-dev \
            ninja-build

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DMSWIKI_WARNINGS_AS_ERRORS=ON \
            -DMSWIKI_STRICT_CLANG=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Run self-test
        run: ./build/mswiki --self-test

      - name: Run static analysis
        run: cppcheck --enable=warning,style,performance,portability --std=c++11 --inline-suppr src/main.cpp

  docker:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/mtstanfield/mswiki:latest
